[build-system]
requires = [
  "scikit-build-core>=0.9.8",
  "pybind11>=2.12.0"
]
build-backend = "scikit_build_core.build"

[project]
name = "hdb"
version = "0.1.0"
description = "Python bindings for HDB standard runtime"
readme = "README.md"
requires-python = ">=3.9"
dependencies = []

[dependency-groups]
dev = [
  "pybind11>=2.12.0",
  "scikit-build-core>=0.9.8",
]

[tool.scikit-build]
minimum-version = "0.9"
cmake.build-type = "Release"
